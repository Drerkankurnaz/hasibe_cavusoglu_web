# www'suz alan adını kanonik (www'lu) adrese yönlendir.
# Aksi halde site hem www'lu hem www'suz açılır; her biri ayrı session
# cookie'si tutar ve admin paneli sürekli login ekranına döner.
server {
    listen 443 ssl;
    http2 on;
    server_name hasibecavusoglu.com;

    # Cloudflare Origin SSL sertifikaları (yönlendirme için de gerekli)
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://www.hasibecavusoglu.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.hasibecavusoglu.com;
    root /var/www/html/public;
    index index.php;

    # Cloudflare Origin SSL sertifikaları
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    # SSL ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Laravel URL yeniden yazma
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Cloudflare/HTTPS arkasında Laravel'in isteği "https" görmesini sağla
        # (yoksa secure session cookie yazılmaz, giriş kalıcı olmaz).
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param REQUEST_SCHEME https;
    }

    # Statik dosya cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gizli dosyalara erişim engeli
    location ~ /\.(?!well-known) {
        deny all;
    }
}
