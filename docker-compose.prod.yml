services:
  # Uretim ortami icin PHP-FPM override
  app:
    build:
      target: production
    volumes:
      - storage_data:/var/www/html/storage/app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  # Nginx - port 80 + 443 (Cloudflare Origin SSL)
  nginx:
    ports:
      - "80:80"
      - "443:443"
